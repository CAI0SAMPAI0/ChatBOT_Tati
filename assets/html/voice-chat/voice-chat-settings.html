<!-- ── Settings Page ── -->
<div class="voice-page">
    <!-- ── Header ── -->
    <div style="margin-bottom: 1.5rem;">
        <h1 style="font-size: 1.4rem; font-weight: 700; margin: 0;">⚙️ Configurações</h1>
    </div>

    <!-- ── Tabs de Configuração ── -->
    <div id="settings-tabs" style="display: flex; gap: 12px; margin-bottom: 1.5rem; border-bottom: 1px solid #252d3d; padding-bottom: 12px;">
        <button 
            class="tab-btn active" 
            data-tab="profile"
            style="
                background: none;
                border: none;
                color: #8b5cf6;
                cursor: pointer;
                font-weight: 600;
                padding: 6px 0;
                border-bottom: 2px solid #8b5cf6;
            "
        >
            👤 Perfil
        </button>
        <button 
            class="tab-btn" 
            data-tab="voice"
            style="
                background: none;
                border: none;
                color: #4a5a6a;
                cursor: pointer;
                font-weight: 600;
                padding: 6px 0;
                border-bottom: 2px solid transparent;
            "
        >
            🎤 Voz
        </button>
        <button 
            class="tab-btn" 
            data-tab="privacy"
            style="
                background: none;
                border: none;
                color: #4a5a6a;
                cursor: pointer;
                font-weight: 600;
                padding: 6px 0;
                border-bottom: 2px solid transparent;
            "
        >
            🔒 Privacidade
        </button>
    </div>

    <!-- ── Tab: Perfil ── -->
    <div id="tab-profile" class="settings-tab">
        <h3 style="margin-top: 0;">Foto de Perfil</h3>
        <div style="margin: 1rem 0;">
            <img 
                id="settings-avatar" 
                src="" 
                alt="Avatar"
                style="
                    width: 80px;
                    height: 80px;
                    border-radius: 50%;
                    object-fit: cover;
                    border: 3px solid #8b5cf6;
                    display: none;
                "
            />
            <div 
                id="settings-avatar-emoji"
                style="
                    width: 80px;
                    height: 80px;
                    border-radius: 50%;
                    background: linear-gradient(135deg, #1a2535, #0f1824);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 28px;
                    border: 3px solid #8b5cf6;
                "
            >
                😊
            </div>
        </div>

        <h3>Informações da Conta</h3>
        <div style="margin: 1rem 0;">
            <div style="margin-bottom: 1rem;">
                <label style="display: block; font-size: 0.85rem; color: #e6edf3; margin-bottom: 6px;">
                    📝 Nome
                </label>
                <input 
                    type="text" 
                    id="settings-name"
                    value="Usuario"
                    style="
                        width: 100%;
                        padding: 8px 12px;
                        background: #0a1020;
                        border: 1px solid #252d3d;
                        border-radius: 8px;
                        color: #e6edf3;
                        font-family: inherit;
                    "
                />
            </div>

            <div style="margin-bottom: 1rem;">
                <label style="display: block; font-size: 0.85rem; color: #e6edf3; margin-bottom: 6px;">
                    📧 Email
                </label>
                <input 
                    type="email" 
                    id="settings-email"
                    value="user@example.com"
                    style="
                        width: 100%;
                        padding: 8px 12px;
                        background: #0a1020;
                        border: 1px solid #252d3d;
                        border-radius: 8px;
                        color: #e6edf3;
                        font-family: inherit;
                    "
                />
            </div>

            <div style="margin-bottom: 1rem;">
                <label style="display: block; font-size: 0.85rem; color: #e6edf3; margin-bottom: 6px;">
                    🎨 Cor Preferida
                </label>
                <div style="display: flex; gap: 8px; margin-top: 8px;">
                    <input 
                        type="color" 
                        id="settings-color"
                        value="#8b5cf6"
                        style="width: 50px; height: 50px; border-radius: 8px; cursor: pointer;"
                    />
                    <div style="padding: 8px 0;">
                        <p style="margin: 0; color: #8b5cf6; font-weight: 600;">Roxo</p>
                        <p style="margin: 4px 0 0; font-size: 0.75rem; color: #4a5a6a;">#8b5cf6</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Tab: Voz ── -->
    <div id="tab-voice" class="settings-tab" style="display: none;">
        <h3 style="margin-top: 0;">Preferências de Voz</h3>
        
        <div style="margin: 1rem 0;">
            <label style="display: block; font-size: 0.85rem; color: #e6edf3; margin-bottom: 8px;">
                🎵 Idioma
            </label>
            <select 
                id="settings-language"
                style="
                    width: 100%;
                    padding: 8px 12px;
                    background: #0a1020;
                    border: 1px solid #252d3d;
                    border-radius: 8px;
                    color: #e6edf3;
                    font-family: inherit;
                    cursor: pointer;
                "
            >
                <option value="pt-BR">Português (Brasil)</option>
                <option value="en-US">English (US)</option>
                <option value="es-ES">Español</option>
            </select>
        </div>

        <div style="margin: 1rem 0;">
            <label style="display: block; font-size: 0.85rem; color: #e6edf3; margin-bottom: 8px;">
                📈 Velocidade de Fala
            </label>
            <input 
                type="range" 
                id="settings-speech-speed"
                min="0.5"
                max="2"
                step="0.1"
                value="1"
                style="width: 100%; cursor: pointer;"
            />
            <p style="font-size: 0.75rem; color: #4a5a6a; margin: 4px 0 0;">
                <span id="settings-speed-value">1.0x</span>
            </p>
        </div>

        <div style="margin: 1rem 0;">
            <label style="display: block; font-size: 0.85rem; color: #e6edf3; margin-bottom: 8px;">
                🔊 Volume Padrão
            </label>
            <input 
                type="range" 
                id="settings-volume"
                min="0"
                max="100"
                value="80"
                style="width: 100%; cursor: pointer;"
            />
            <p style="font-size: 0.75rem; color: #4a5a6a; margin: 4px 0 0;">
                <span id="settings-volume-value">80%</span>
            </p>
        </div>
    </div>

    <!-- ── Tab: Privacidade ── -->
    <div id="tab-privacy" class="settings-tab" style="display: none;">
        <h3 style="margin-top: 0;">Privacidade e Dados</h3>

        <div style="display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #252d3d;">
            <input 
                type="checkbox" 
                id="settings-save-history"
                checked
                style="width: 18px; height: 18px; cursor: pointer;"
            />
            <label for="settings-save-history" style="cursor: pointer; flex: 1;">
                <p style="margin: 0; color: #e6edf3; font-weight: 500;">Salvar Histórico</p>
                <p style="margin: 4px 0 0; font-size: 0.75rem; color: #4a5a6a;">Manter conversa para referência</p>
            </label>
        </div>

        <div style="display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #252d3d;">
            <input 
                type="checkbox" 
                id="settings-analytics"
                checked
                style="width: 18px; height: 18px; cursor: pointer;"
            />
            <label for="settings-analytics" style="cursor: pointer; flex: 1;">
                <p style="margin: 0; color: #e6edf3; font-weight: 500;">Dados de Uso</p>
                <p style="margin: 4px 0 0; font-size: 0.75rem; color: #4a5a6a;">Ajudar a melhorar a app com análise</p>
            </label>
        </div>

        <div style="padding: 12px 0;">
            <button 
                id="settings-delete-history"
                style="
                    background: #e05c2a;
                    color: white;
                    border: none;
                    padding: 8px 16px;
                    border-radius: 6px;
                    cursor: pointer;
                    font-weight: 600;
                    font-size: 0.85rem;
                    transition: background 0.15s;
                "
                onmouseover="this.style.background='#c44a1a'"
                onmouseout="this.style.background='#e05c2a'"
            >
                🗑️ Limpar Histórico
            </button>
        </div>
    </div>

    <!-- ── Botões de Ação ── -->
    <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #252d3d; display: flex; gap: 10px;">
        <button 
            id="settings-save"
            style="
                flex: 1;
                padding: 10px 16px;
                background: linear-gradient(135deg, #6c3fc5, #8b5cf6);
                color: white;
                border: none;
                border-radius: 8px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.15s;
            "
            onmouseover="this.style.boxShadow='0 0 22px rgba(139,92,246,0.5)'"
            onmouseout="this.style.boxShadow='none'"
        >
            ✓ Salvar Alterações
        </button>
        <button 
            id="settings-cancel"
            style="
                flex: 1;
                padding: 10px 16px;
                background: #0a1020;
                color: #8b949e;
                border: 1px solid #252d3d;
                border-radius: 8px;
                font-weight: 600;
                cursor: pointer;
                transition: border-color 0.15s;
            "
            onmouseover="this.style.borderColor='#8b5cf6'"
            onmouseout="this.style.borderColor='#252d3d'"
        >
            ✕ Cancelar
        </button>
    </div>
</div>

<script>
// Script para gerenciar abas
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const tabName = btn.dataset.tab;
        
        // Ocultar todas as abas
        document.querySelectorAll('.settings-tab').forEach(tab => {
            tab.style.display = 'none';
        });
        
        // Mostrar aba selecionada
        document.getElementById(`tab-${tabName}`).style.display = 'block';
        
        // Atualizar botões
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.style.color = b === btn ? '#8b5cf6' : '#4a5a6a';
            b.style.borderBottomColor = b === btn ? '#8b5cf6' : 'transparent';
        });
    });
});

// Atualizar valores de range
document.getElementById('settings-speech-speed').addEventListener('input', (e) => {
    document.getElementById('settings-speed-value').textContent = e.target.value + 'x';
});

document.getElementById('settings-volume').addEventListener('input', (e) => {
    document.getElementById('settings-volume-value').textContent = e.target.value + '%';
});
</script>
