<!DOCTYPE html>
<html>

<head>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }
  </style>
</head>

<body>
  <script>
    (function () {
      var doc = window.parent.document;

      function inject() {
        if (doc.getElementById('pav-bar')) return;

        // Injeta CSS fixo no head do pai — sem JS de posicionamento
        if (!doc.getElementById('pav-bar-style')) {
          var s = doc.createElement('style');
          s.id = 'pav-bar-style';
          s.textContent = `
        #pav-bar {
          position: fixed;
          bottom: 18px;
          right: 58px;
          z-index: 2147483647;
          display: flex;
          align-items: center;
          gap: 4px;
          pointer-events: none;
        }
        #pav-mic-btn, #pav-clip-btn {
          pointer-events: auto;
          width: 36px;
          height: 36px;
          border-radius: 50%;
          border: 1px solid #30363d;
          background: #0d1117;
          color: #8b949e;
          font-size: 15px;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          box-shadow: 0 2px 8px rgba(0,0,0,0.4);
          -webkit-tap-highlight-color: transparent;
          touch-action: manipulation;
          transition: background .15s, color .15s, border-color .15s;
          outline: none;
        }
        #pav-mic-btn:hover, #pav-clip-btn:hover {
          background: #1c2128;
          color: #e6edf3;
          border-color: #484f58;
        }
        #pav-mic-btn.recording {
          background: #e05c2a;
          border-color: #e05c2a;
          color: #fff;
          animation: pav-mic-pulse 1.2s ease-in-out infinite;
        }
        @keyframes pav-mic-pulse {
          0%   { box-shadow: 0 0 0 0 rgba(224,92,42,0.6); }
          70%  { box-shadow: 0 0 0 8px rgba(224,92,42,0); }
          100% { box-shadow: 0 0 0 0 rgba(224,92,42,0); }
        }
        /* Ajuste fino por breakpoint */
        @media(max-width: 768px){
          #pav-bar { bottom: 12px; right: 48px; }
          #pav-mic-btn, #pav-clip-btn { width: 34px; height: 34px; font-size: 14px; }
        }
      `;
          doc.head.appendChild(s);
        }

        // Garante que o bar está no body do pai, não dentro de um iframe
        try {
          if (bar.ownerDocument !== doc) {
            doc.body.appendChild(bar);
          }
        } catch (e) { }

        // Força o bar para fora de qualquer overflow:hidden
        bar.style.cssText = 'position:fixed!important;bottom:18px!important;right:58px!important;z-index:2147483647!important;display:flex!important;align-items:center!important;gap:4px!important;pointer-events:none!important;';

        var bar = doc.createElement('div');
        bar.id = 'pav-bar';

        var cl = doc.createElement('button');
        cl.id = 'pav-clip-btn';
        cl.title = 'Attach file';
        cl.innerHTML = '<i class="fa-solid fa-paperclip"></i>';

        var mi = doc.createElement('button');
        mi.id = 'pav-mic-btn';
        mi.title = 'Record audio';
        mi.innerHTML = '<i class="fa-solid fa-microphone"></i>';

        bar.appendChild(cl);
        bar.appendChild(mi);
        doc.body.appendChild(bar);

        // Clipe
        cl.addEventListener('click', function () {
          var inp = doc.querySelector('[data-testid="stFileUploader"] input[type="file"]');
          if (inp) inp.click();
        });

        // Mic
        var rec = false;
        function getRb() {
          var ai = doc.querySelector('[data-testid="stAudioInput"]');
          if (!ai) return null;
          var bs = ai.querySelectorAll('button');
          for (var i = 0; i < bs.length; i++) {
            if ((bs[i].getAttribute('aria-label') || '').toLowerCase().indexOf('download') >= 0) continue;
            return bs[i];
          }
          return bs[0] || null;
        }

        mi.addEventListener('click', function () {
          var rb = getRb(); if (!rb) return;
          if (rec) {
            rec = false;
            mi.innerHTML = '<i class="fa-solid fa-microphone"></i>';
            mi.classList.remove('recording');
            rb.click();
          } else {
            rec = true;
            mi.innerHTML = '<i class="fa-solid fa-stop"></i>';
            mi.classList.add('recording');
            rb.click();
          }
        });

        // Reset visual quando Streamlit recria o audio_input
        var _lastAi = null;
        setInterval(function () {
          var ai = doc.querySelector('[data-testid="stAudioInput"]');
          if (ai !== _lastAi) { _lastAi = ai; if (rec) { rec = false; mi.innerHTML = '<i class="fa-solid fa-microphone"></i>'; mi.classList.remove('recording'); } }
        }, 500);
      }

      inject();
      setTimeout(inject, 300);
      setTimeout(inject, 800);

      // Reinjecta se o DOM remover o bar (troca de página)
      try {
        var ob = new MutationObserver(function () {
          if (!doc.getElementById('pav-bar')) inject();
        });
        ob.observe(doc.body, { childList: true, subtree: false });
        setTimeout(function () { ob.disconnect(); }, 30000);
      } catch (e) { }
    })();
  </script>
</body>

</html>
